            const seeded = (i) => {
                const x = Math.sin(i * 9301 + 4927) * 49297;
                return x - Math.floor(x);

                    const jitterX = (seeded(index) - 0.5) * 4;
                    const jitterY = (seeded(index + 100) - 0.5) * 4;

                    return {
                        id: index,
                        text: skill,
                        x: 50 + radius * Math.cos(angle) + jitterX,
                        y: 50 + radius * Math.sin(angle) + jitterY,

                if (isDeleting && text === '') {
                    setIsDeleting(false);
                    setRoleIndex((prev) => (prev + 1) % ACTIVE_ROLES.length);
                    return;
                }

                const timeout = setTimeout(() => {
                    setText(isDeleting
                        ? currentRole.substring(0, text.length - 1)
                        : currentRole.substring(0, text.length + 1)
                    );
                }, speed);
                return () => clearTimeout(timeout);
            }, [text, isDeleting, roleIndex]);

            return <span>{text}<span className="typing-cursor" /></span>;
        };

        // Cursor glow that follows mouse
        const CursorGlow = () => {
            const ref = useRef(null);
            useEffect(() => {
                const move = (e) => {
                    if (ref.current) {
                        ref.current.style.left = e.clientX + 'px';
                        ref.current.style.top = e.clientY + 'px';
                    }
                };
                window.addEventListener('mousemove', move);
                return () => window.removeEventListener('mousemove', move);
            }, []);
            return <div ref={ref} className="cursor-glow hidden md:block" />;
        };

        // --- SCRAMBLE TEXT EFFECT ---
        const ScrambleText = ({ text, className = "" }) => {
            const [displayText, setDisplayText] = useState(text);
            const [hasAnimated, setHasAnimated] = useState(false);
            const ref = useRef(null);
            const chars = "!@#$%^&*()_+-=[]{}|;:,.<>?";

            useEffect(() => {
                if (!ref.current) return;
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting && !hasAnimated) {
                        setHasAnimated(true);
                        let iteration = 0;
                        const maxIterations = text.length * 3;
                        const interval = setInterval(() => {
                            setDisplayText(
                                text.split("").map((char, i) => {
                                    if (char === " ") return " ";
                                    if (i < iteration / 3) return text[i];
                                    return chars[Math.floor(Math.random() * chars.length)];
                                }).join("")
                            );
                            iteration++;
                            if (iteration > maxIterations) {
                                clearInterval(interval);
                                setDisplayText(text);
                            }
                        }, 30);
                    }
                }, { threshold: 0.3 });
                observer.observe(ref.current);
                return () => observer.disconnect();
            }, [text, hasAnimated]);

            return <span ref={ref} className={className}>{displayText}</span>;
        };

        const KonamiCode = ({ onActivate }) => {
            const callbackRef = useRef(onActivate);
            callbackRef.current = onActivate;

            useEffect(() => {
                const sequence = [38, 38, 40, 40, 37, 39, 37, 39, 66, 65];
                let pos = 0;
                const handler = (e) => {
                    if (e.keyCode === sequence[pos]) {
                        pos++;
                        if (pos === sequence.length) {
                            pos = 0;
                            callbackRef.current();
                        }
                    } else {
                        pos = 0;
                    }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, []);
            return null;
        };

                if (!ref.current || window.innerWidth < 768) return;
                const rect = ref.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                setPosition({
                    x: (e.clientX - centerX) * 0.3,
                    y: (e.clientY - centerY) * 0.3
                });
            };

            return (
                <motion.div
                    ref={ref}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={() => setPosition({ x: 0, y: 0 })}
                    className="inline-block p-2 -m-2"
                >
                    <motion.button
                        onClick={onClick}
                        animate={{ x: position.x, y: position.y }}
                        transition={{ type: "spring", stiffness: 150, damping: 15, mass: 0.1 }}

                                    <p className="text-gray-500 max-w-2xl mx-auto mb-10">

                                        <a href="mailto:nnivetha373@gmail.com" className="px-8 py-4 bg-accent text-white font-bold rounded-full hover:scale-105 transition-transform flex items-center justify-center gap-3 accent-button-shadow"><Icon name="mail" size={20} /> nnivetha373@gmail.com</a>
                                        <a href="https://www.linkedin.com/in/nivetha-sivakumar2001/" target="_blank" rel="noopener noreferrer" className="px-8 py-4 dark:bg-white/5 bg-black/5 border border-border dark:text-white text-gray-900 font-bold rounded-full dark:hover:bg-white/10 hover:bg-black/10 transition-colors flex items-center justify-center gap-3"><Icon name="linkedin" size={20} /> LinkedIn</a>

                            </div>

                    <footer className="py-8 text-center text-gray-600 text-sm border-t border-border">
                        <p>Crafted with <span className="text-accent animate-pulse inline-block">&#9829;</span> by Nivetha Sivakumar</p>
                        <p className="mt-2 dark:text-gray-500 text-gray-500 text-xs font-mono">{footerQuote}</p>
                        <p className="mt-3">
                            <a href={IS_SERVICENOW ? 'https://nivetha.info' : 'https://servicenow.nivetha.info'} className="text-xs text-accent/70 hover:text-accent transition-colors font-mono">
                                {IS_SERVICENOW ? 'View Main Portfolio →' : 'View ServiceNow Track →'}
                            </a>
                        </p>
                    </footer>
                    <ProjectModal project={selectedProject} onClose={() => setSelectedProject(null)} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
