            const seeded = (i) => {
                const x = Math.sin(i * 9301 + 4927) * 49297;
                return x - Math.floor(x);
            };

            const cloudData = useMemo(() => {
                const total = ACTIVE_SKILLS.length;
                const maxRadius = 38;
                const goldenAngle = 137.508 * (Math.PI / 180);

                return ACTIVE_SKILLS.map((skill, index) => {
                    const weight = prioritySkills.has(skill) ? 3 : skill.length > 7 ? 2 : 1;
                    const angle = goldenAngle * index;
                    const radius = Math.sqrt((index + 1) / total) * maxRadius;
                    const jitterX = (seeded(index) - 0.5) * 4;
                    const jitterY = (seeded(index + 100) - 0.5) * 4;

                    return {
                        id: index,
                        text: skill,
                        x: 50 + radius * Math.cos(angle) + jitterX,
                        y: 50 + radius * Math.sin(angle) + jitterY,

        // Typewriter effect cycling through quirky roles
        const TypingRole = () => {
            const [roleIndex, setRoleIndex] = useState(0);
            const [text, setText] = useState('');
            const [isDeleting, setIsDeleting] = useState(false);

            useEffect(() => {
                const currentRole = ACTIVE_ROLES[roleIndex];
                const speed = isDeleting ? 30 : 60;

                if (!isDeleting && text === currentRole) {
                    const timeout = setTimeout(() => setIsDeleting(true), 2000);
                    return () => clearTimeout(timeout);
                }
                if (isDeleting && text === '') {
                    setIsDeleting(false);
                    setRoleIndex((prev) => (prev + 1) % ACTIVE_ROLES.length);
                    return;
                }

                const timeout = setTimeout(() => {
                    setText(isDeleting
                        ? currentRole.substring(0, text.length - 1)
                        : currentRole.substring(0, text.length + 1)
                    );
                }, speed);
                return () => clearTimeout(timeout);
            }, [text, isDeleting, roleIndex]);

            return <span>{text}<span className="typing-cursor" /></span>;
        };

        // Cursor glow that follows mouse
        const CursorGlow = () => {
            const ref = useRef(null);
            useEffect(() => {
                const move = (e) => {
                    if (ref.current) {
                        ref.current.style.left = e.clientX + 'px';
                        ref.current.style.top = e.clientY + 'px';
                    }
                };
                window.addEventListener('mousemove', move);
                return () => window.removeEventListener('mousemove', move);
            }, []);
            return <div ref={ref} className="cursor-glow hidden md:block" />;
        };

        // --- SCRAMBLE TEXT EFFECT ---
        const ScrambleText = ({ text, className = "" }) => {
            const [displayText, setDisplayText] = useState(text);
            const [hasAnimated, setHasAnimated] = useState(false);
            const ref = useRef(null);
            const chars = "!@#$%^&*()_+-=[]{}|;:,.<>?";

            useEffect(() => {
                if (!ref.current) return;
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting && !hasAnimated) {
                        setHasAnimated(true);
                        let iteration = 0;
                        const maxIterations = text.length * 3;
                        const interval = setInterval(() => {
                            setDisplayText(
                                text.split("").map((char, i) => {
                                    if (char === " ") return " ";
                                    if (i < iteration / 3) return text[i];
                                    return chars[Math.floor(Math.random() * chars.length)];
                                }).join("")
                            );
                            iteration++;
                            if (iteration > maxIterations) {
                                clearInterval(interval);
                                setDisplayText(text);
                            }
                        }, 30);
                    }
                }, { threshold: 0.3 });
                observer.observe(ref.current);
                return () => observer.disconnect();
            }, [text, hasAnimated]);

            return <span ref={ref} className={className}>{displayText}</span>;
        };

        // --- KONAMI CODE EASTER EGG ---
        const KonamiCode = ({ onActivate }) => {
            const callbackRef = useRef(onActivate);
            callbackRef.current = onActivate;

            useEffect(() => {
                const sequence = [38, 38, 40, 40, 37, 39, 37, 39, 66, 65];
                let pos = 0;
                const handler = (e) => {
                    if (e.keyCode === sequence[pos]) {
                        pos++;
                        if (pos === sequence.length) {
                            pos = 0;
                            callbackRef.current();
                        }
                    } else {
                        pos = 0;
                    }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, []);
            return null;
        };

            const ref = useRef(null);
            const [position, setPosition] = useState({ x: 0, y: 0 });

            const handleMouseMove = (e) => {
                if (!ref.current || window.innerWidth < 768) return;
                const rect = ref.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                setPosition({
                    x: (e.clientX - centerX) * 0.3,
                    y: (e.clientY - centerY) * 0.3
                });
            };

            return (
                <motion.div
                    ref={ref}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={() => setPosition({ x: 0, y: 0 })}
                    className="inline-block p-2 -m-2"
                >
                    <motion.button
                        onClick={onClick}
                        animate={{ x: position.x, y: position.y }}
                        transition={{ type: "spring", stiffness: 150, damping: 15, mass: 0.1 }}
