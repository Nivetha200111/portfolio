        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {

        // --- INTERACTIVE WORDCLOUD ---
        const WordCloud = ({ activeProject, onHoverSkill, activeSkill }) => {
            const prefersReducedMotion = useReducedMotion();
            
            const cloudData = useMemo(() => {
                return RAW_SKILLS.map((skill, i) => ({
                    id: i,
                    text: skill,
                    x: Math.random() * 90 + 5,
                    y: Math.random() * 90 + 5,
                    sizeClass: Math.random() > 0.7 ? 'text-2xl font-bold' : Math.random() > 0.4 ? 'text-lg' : 'text-sm',
                    floatY: Math.random() * 20 - 10,
                    duration: 3 + Math.random() * 4,
                    delay: Math.random() * 2,
                    blur: Math.random() > 0.8 ? 'blur-[1px]' : 'blur-0'
                }));
            }, []);
 
            return (
                <div className="relative w-full h-[500px] bg-card rounded-2xl border border-border overflow-hidden flex items-center justify-center shadow-2xl">
                    <div className="absolute inset-0 opacity-20" 
                         style={{ backgroundImage: 'radial-gradient(circle, #333 1px, transparent 1px)', backgroundSize: '30px 30px' }}>
                    </div>
 
                    <div className="relative w-full h-full">
                        {cloudData.map((item) => {
                            // Determine state
                            const isHoveredByProject = activeProject?.stack?.includes(item.text);
                            const isThisSkillActive = activeSkill === item.text;
                            
                            // Logic: 
                            // 1. If a project is hovered, and this skill is in that project -> Highlight
                            // 2. If a project is hovered, and this skill is NOT in that project -> Dim
                            // 3. If this skill is hovered -> Highlight
                            // 4. If another skill is hovered -> Dim this one
                            
                            let opacity = 1;
                            let scale = 1;
                            let colorClass = isThisSkillActive ? "text-accent" : item.sizeClass.includes('font-bold') ? "text-white" : "text-gray-400";
                            let filter = item.blur;
 
                            if (activeProject) {
                                if (isHoveredByProject) {
                                    opacity = 1;
                                    scale = 1.3;
                                    colorClass = "text-white";
                                    filter = "blur-0";
                                } else {
                                    opacity = 0.15;
                                    scale = 0.9;
                                    colorClass = "text-gray-600";
                                }
                            } else if (activeSkill) {
                                if (isThisSkillActive) {
                                    opacity = 1;
                                    scale = 1.5;
                                    colorClass = "text-accent";
                                    filter = "blur-0 drop-shadow-[0_0_8px_rgba(139,92,246,0.8)]";
                                } else {
                                    opacity = 0.2;
                                }
                            }
 
                            return (
                                <motion.span
                                    key={item.id}
                                    className={`absolute cursor-pointer transition-colors ${colorClass} ${filter}`}
                                    style={{ left: `${item.x}%`, top: `${item.y}%` }}
                                    initial={{ opacity: 0, scale: 0 }}
                                    animate={prefersReducedMotion ? { opacity, scale } : {
                                        opacity,
                                        scale,
                                        y: activeProject || activeSkill ? 0 : [0, item.floatY, 0]
                                    }}
                                    transition={{
                                        duration: 0.4,
                                        ...(prefersReducedMotion ? {} : { float: { duration: item.duration, repeat: Infinity, ease: "easeInOut" }})
                                    }}
                                    onMouseEnter={() => onHoverSkill(item.text)}
                                    onMouseLeave={() => onHoverSkill(null)}
                                >

                                </motion.span>
                            );
                        })}

        // --- CONNECTED PROJECT CARD ---
        const ProjectCard = ({ project, onClick, activeSkill, onHoverProject }) => {
            const ref = useRef(null);
            const [mousePosition, setMousePosition] = useState({ x: 0, y: 0 });
            const [isHovered, setIsHovered] = useState(false);
 
            const handleMouseMove = (e) => {
                if (!ref.current) return;
                const rect = ref.current.getBoundingClientRect();
                setMousePosition({
                    x: e.clientX - rect.left,
                    y: e.clientY - rect.top
                });
            };
 
            // Connection Logic
            const isRelevant = !activeSkill || project.stack?.includes(activeSkill);
 
            return (
                <motion.div
                    ref={ref}
                    onMouseMove={handleMouseMove}
                    onMouseEnter={() => { setIsHovered(true); onHoverProject(project); }}
                    onMouseLeave={() => { setIsHovered(false); onHoverProject(null); }}
                    onClick={onClick}
                    className={`relative h-full p-[1px] rounded-2xl cursor-pointer group spotlight-card spotlight-border transition-all duration-300 ${
                        !isRelevant && activeSkill ? 'grayscale opacity-30 scale-95' : 'opacity-100 scale-100'
                    }`}
                    style={{
                        "--mouse-x": `${mousePosition.x}px`,
                        "--mouse-y": `${mousePosition.y}px`,

                    }}
                    initial={{ opacity: 0, y: 30 }}
                    whileInView={{ opacity: 1, y: 0 }}

        // Typewriter effect cycling through quirky roles
        const TypingRole = () => {
            const roles = [
                "Code Alchemist & Systems Tinkerer",
                "Bug Whisperer",
                "Ctrl+Z Enthusiast",
                "Full-Stack Sorcerer",
                "Pipeline Plumber",
                "Chaos to Code Translator"
            ];
            const [roleIndex, setRoleIndex] = useState(0);
            const [text, setText] = useState('');
            const [isDeleting, setIsDeleting] = useState(false);

            useEffect(() => {
                const currentRole = roles[roleIndex];
                const speed = isDeleting ? 30 : 60;

                if (!isDeleting && text === currentRole) {
                    const timeout = setTimeout(() => setIsDeleting(true), 2000);
                    return () => clearTimeout(timeout);
                }
                if (isDeleting && text === '') {
                    setIsDeleting(false);
                    setRoleIndex((prev) => (prev + 1) % roles.length);
                    return;
                }

                const timeout = setTimeout(() => {
                    setText(isDeleting
                        ? currentRole.substring(0, text.length - 1)
                        : currentRole.substring(0, text.length + 1)
                    );
                }, speed);
                return () => clearTimeout(timeout);
            }, [text, isDeleting, roleIndex]);

            return <span>{text}<span className="typing-cursor" /></span>;
        };

        // Cursor glow that follows mouse
        const CursorGlow = () => {
            const ref = useRef(null);
            useEffect(() => {
                const move = (e) => {
                    if (ref.current) {
                        ref.current.style.left = e.clientX + 'px';
                        ref.current.style.top = e.clientY + 'px';
                    }
                };
                window.addEventListener('mousemove', move);
                return () => window.removeEventListener('mousemove', move);
            }, []);
            return <div ref={ref} className="cursor-glow hidden md:block" />;

        const App = () => {
            const [selectedProject, setSelectedProject] = useState(null);
            const [activeSkill, setActiveSkill] = useState(null); // Skill being hovered in cloud
            const [hoveredProject, setHoveredProject] = useState(null); // Project being hovered in cards

                "Full-Stack Sorcerer",

            const [roleIndex, setRoleIndex] = useState(0);
            const [text, setText] = useState('');
            const [isDeleting, setIsDeleting] = useState(false);

            useEffect(() => {
                const currentRole = roles[roleIndex];
                const speed = isDeleting ? 30 : 60;

                if (!isDeleting && text === currentRole) {
                    const timeout = setTimeout(() => setIsDeleting(true), 2000);
                    return () => clearTimeout(timeout);
                }
                if (isDeleting && text === '') {
                    setIsDeleting(false);
                    setRoleIndex((prev) => (prev + 1) % roles.length);
                    return;
                }

                const timeout = setTimeout(() => {
                    setText(isDeleting
                        ? currentRole.substring(0, text.length - 1)

                return () => clearTimeout(timeout);

            const ref = useRef(null);
            const chars = "!@#$%^&*()_+-=[]{}|;:,.<>?";

            useEffect(() => {
                if (!ref.current) return;
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting && !hasAnimated) {
                        setHasAnimated(true);
                        let iteration = 0;
                        const maxIterations = text.length * 3;
                        const interval = setInterval(() => {
                            setDisplayText(
                                text.split("").map((char, i) => {
                                    if (char === " ") return " ";
                                    if (i < iteration / 3) return text[i];
                                    return chars[Math.floor(Math.random() * chars.length)];
                                }).join("")
                            );
                            iteration++;
                            if (iteration > maxIterations) {
                                clearInterval(interval);
                                setDisplayText(text);
                            }
                        }, 30);
                    }
                }, { threshold: 0.3 });
                observer.observe(ref.current);
                return () => observer.disconnect();
            }, [text, hasAnimated]);

            return <span ref={ref} className={className}>{displayText}</span>;
        };

            callbackRef.current = onActivate;

                const sequence = [38, 38, 40, 40, 37, 39, 37, 39, 66, 65];
                let pos = 0;
                const handler = (e) => {
                    if (e.keyCode === sequence[pos]) {
                        pos++;
                        if (pos === sequence.length) {
                            pos = 0;
                            callbackRef.current();
                        }
                    } else {
                        pos = 0;
                    }
                };
                window.addEventListener('keydown', handler);
                return () => window.removeEventListener('keydown', handler);
            }, []);
            return null;

                const rect = ref.current.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                setPosition({
                    x: (e.clientX - centerX) * 0.3,
                    y: (e.clientY - centerY) * 0.3
                });
            };

            return (
                <motion.div
                    ref={ref}
                    onMouseMove={handleMouseMove}
                    onMouseLeave={() => setPosition({ x: 0, y: 0 })}
                    className="inline-block p-2 -m-2"
                >
                    <motion.button
                        onClick={onClick}
                        animate={{ x: position.x, y: position.y }}
                        transition={{ type: "spring", stiffness: 150, damping: 15, mass: 0.1 }}
